# 规划委员会 — 角色分工与触发条件
# 修改后重启服务或 agent_engine.domain.committee_config.reload_committee_config() 生效
# 说明文档：项目文档/8-规划委员会配置.md

label: 规划委员会
description: 任务规划前的轻量多角色讨论；角色顺序即发言顺序。

# 哪些任务创建来源走委员会（其余走单 Planner）
trigger_sources:
  - chat_upgrade
  - task_center

# 三角角色：id 稳定不可随意改（与 prompts.yaml 中 agents.planning_* 对应）
roles:
  - id: domain
    label: 领域顾问
    description: 拆解执行步骤与 success_criteria；参考 Rubric 与工具白名单
    prompt: planning_domain
    order: 1

  - id: risk
    label: 风险审查
    description: 审阅步骤建议，标注 gate 与 estimated_risk
    prompt: planning_risk
    order: 2
    reads_prior: [domain]

  - id: chair
    label: 主持人
    description: 综合各方意见，合成可执行 Plan JSON
    prompt: planning_chair
    order: 3
    synthesizes_plan: true
    reads_prior: [domain, risk]

# LLM 失败时的规则兜底（按 task_type）
fallback:
  domain:
    default_summary: 按任务类型拆解标准步骤
  risk:
    by_task_type:
      wiki_organize_decisions:
        estimated_risk: medium
        summary: 按企业 gate 策略标注高风险写操作
        gate_overrides:
          - step_action: compile_candidates
            gate: auto_if_low_risk
            reason: Wiki 写操作需按档 1 策略人工确认
      sales_proposal:
        estimated_risk: medium
        summary: 销售方案涉及对外输出，建议 medium 风险
        gate_overrides: []
    default:
      estimated_risk: low
      summary: 按企业 gate 策略标注高风险写操作
      gate_overrides: []
