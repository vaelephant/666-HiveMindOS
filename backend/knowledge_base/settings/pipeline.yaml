# 知识管线四阶段 — 侧栏 / 概览展示

stages:
  - id: chat
    label: 对话记录
    description: 原始问答，一切知识的起点
  - id: extract
    label: 智慧提炼
    description: L1 每轮异步提取 project / decision / preference
  - id: candidate
    label: Wiki 候选
    description: 符合门槛的事实进入候选池待审核
  - id: wiki
    label: 企业 Wiki
    description: 批准并编译后的结构化知识页

memory_event_labels:
  created: 新增智慧
  updated: 更新智慧
  merged: 合并智慧
  archived: 归档去重

candidate_status_labels:
  pending: 待审核
  approved: 已批准
  merged: 已编译进 Wiki
  rejected: 已驳回
  conflict: 存在冲突
